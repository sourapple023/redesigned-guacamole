<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Glow Search Pro (Upgraded)</title>
    <!-- Google Fonts - Poppins for a clean, modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols Outlined for icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        /* CSS Variables for easy color adjustments (Dark Theme is default) */
        :root {
            --bg-dark: #0a0a0d;
            --bg-gradient-start: #121020; /* Slightly deeper start */
            --bg-gradient-end: #0a0a0d;
            --primary-glow: #00ffff; /* Cyan */
            --primary-glow-darker: #00e6e6;
            --text-light: #e0e0e0;
            --text-medium: #a0a0a0; /* Slightly brighter medium text */
            --input-bg: #1a1a1a;
            --response-bg: rgba(26, 26, 26, 0.9); /* Less transparent */
            --response-border: #383838; /* Slightly lighter border for visibility */
            --code-bg: #2a2a2a;
            --code-border: #555; /* More distinct code border */
            --error-color: #ff6666;
            --button-icon-color: #e0e0e0; /* For theme toggle button */
            --link-color: #00ffff;
            --modal-bg-color: #22222a; /* Slightly darker modal */
            --modal-border-color: #444;
            --suggestion-bg: #262626; /* Slightly darker suggestion bg */
            --suggestion-hover-bg: #3a3a3a;
            --typing-cursor: var(--primary-glow);
            --placeholder-color: var(--text-medium);
            --header-text-shadow: 0 0 12px rgba(0, 255, 255, 0.6); /* Refined header glow */
            --item-fade-transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* Smoother item animation */
        }

        /* Light Theme overrides */
        body.light-theme {
            --bg-dark: #f0f0f5;
            --bg-gradient-start: #ffffff;
            --bg-gradient-end: #e0e0e5;
            --primary-glow: #007bff; /* Blue for light theme */
            --primary-glow-darker: #0056b3;
            --text-light: #2c2c2c; /* Darker text for better contrast */
            --text-medium: #777;
            --input-bg: #ffffff;
            --response-bg: rgba(255, 255, 255, 0.98); /* Almost opaque */
            --response-border: #bbb; /* Lighter border */
            --code-bg: #eff0f3; /* Lighter code bg */
            --code-border: #d8d8e0;
            --error-color: #dc3545;
            --button-icon-color: #444; /* Darker icon for light theme */
            --link-color: #0056b3;
            --modal-bg-color: #fcfcfc;
            --modal-border-color: #d0d0d5;
            --suggestion-bg: #ffffff;
            --suggestion-hover-bg: #f0f0f5;
            --typing-cursor: var(--primary-glow-darker);
            --placeholder-color: #a0a0a0;
            --header-text-shadow: none; /* No text shadow for header in light theme */
        }

        /* Basic Reset & Body Styling */
        body {
            margin: 0;
            padding: 5vh 0; /* Add vertical padding for breathing room */
            font-family: 'Poppins', sans-serif; /* Use Poppins */
            background: radial-gradient(circle at center, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            /* Adjusted background image opacity for a softer texture */
            background-image: url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239C92AC' fill-opacity='0.02' fill-rule='evenodd'%3E%3Cpath d='M0 0h3v3H0V0zm3 3h3v3H3V3z'/%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease; /* Smooth theme transitions */
            text-rendering: optimizeLegibility; /* Improve font rendering */
            -webkit-font-smoothing: antialiased; /* Smoother fonts on Webkit */
            -moz-osx-font-smoothing: grayscale; /* Smoother fonts on Firefox */
        }

        /* App Title */
        .app-title {
            font-size: clamp(2.2em, 5vw, 3.8em); /* More responsive and slightly larger */
            color: var(--primary-glow);
            font-weight: 700;
            margin-bottom: 40px;
            text-shadow: var(--header-text-shadow);
            transition: color 0.5s ease, text-shadow 0.5s ease;
            letter-spacing: 0.5px; /* Subtle letter spacing */
            pointer-events: none; /* Don't interfere with clicks */
            user-select: none;
            text-align: center;
        }

        /* Container for the search bar and button */
        .search-container {
            display: flex;
            align-items: center;
            width: 90%;
            max-width: 600px;
            position: relative;
            margin-bottom: 30px;
            z-index: 10;
            min-width: 280px; /* Ensure it's not too small on tiny screens */
        }

        /* Glowing Search Input */
        #searchInput {
            flex-grow: 1;
            padding: 16px 20px;
            padding-right: 120px; /* Space for buttons */
            font-size: 1.15em;
            font-weight: 400;
            border: 2px solid var(--primary-glow);
            border-radius: 30px;
            background-color: var(--input-bg);
            color: var(--text-light);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4),
                        0 0 20px rgba(0, 255, 255, 0.2),
                        inset 0 0 5px rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease-in-out, background-color 0.5s ease, border-radius 0.3s ease, border-color 0.3s ease; /* Include border-color transition */
            outline: none;
            box-sizing: border-box;
            text-shadow: 0 0 2px rgba(0, 255, 255, 0.1); /* Subtler text shadow for crispness */
            animation: input-pulse 3s infinite alternate ease-in-out;
            min-width: 0; /* Allow input to shrink */
        }

        body.light-theme #searchInput {
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.3), 0 0 20px rgba(0, 123, 255, 0.1), inset 0 0 5px rgba(0, 123, 255, 0.05);
            text-shadow: none;
            animation: input-pulse-light 3s infinite alternate ease-in-out;
        }

        #searchInput::placeholder {
            color: var(--placeholder-color);
            opacity: 0.8; /* Slightly more opaque */
            transition: color 0.5s ease, opacity 0.5s ease;
        }

        #searchInput:focus {
            border-color: var(--primary-glow-darker);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8),
                        0 0 40px rgba(0, 255, 255, 0.5),
                        inset 0 0 10px rgba(0, 255, 255, 0.2);
            background-color: #222; /* Darker on focus for dark theme */
            transform: scale(1.01);
            animation: none;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.3); /* Stronger glow on focus */
        }

        body.light-theme #searchInput:focus {
            background-color: #f8f8f8; /* Lighter on focus for light theme */
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.6), 0 0 40px rgba(0, 123, 255, 0.3), inset 0 0 10px rgba(0, 123, 255, 0.1);
            text-shadow: none;
        }

        /* Animation for input border radius when suggestions appear */
        #searchInput.suggestions-visible {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-color: var(--response-border); /* Match suggestion border */
        }

        /* Input pulse animation - Dark Theme */
        @keyframes input-pulse {
            0% { box-shadow: 0 0 8px rgba(0, 255, 255, 0.4), 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 5px rgba(0, 255, 255, 0.1); }
            100% { box-shadow: 0 0 12px rgba(0, 255, 255, 0.6), 0 0 25px rgba(0, 255, 255, 0.3), inset 0 0 7px rgba(0, 255, 255, 0.15); }
        }
        /* Input pulse animation - Light Theme */
        @keyframes input-pulse-light {
            0% { box-shadow: 0 0 8px rgba(0, 123, 255, 0.3), 0 0 20px rgba(0, 123, 255, 0.1), inset 0 0 5px rgba(0, 123, 255, 0.05); }
            100% { box-shadow: 0 0 12px rgba(0, 123, 255, 0.4), 0 0 25px rgba(0, 123, 255, 0.2), inset 0 0 7px rgba(0, 123, 255, 0.1); }
        }

        /* Button group inside search input */
        .input-buttons {
            position: absolute;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 8px; /* Slightly more space between buttons */
        }

        .input-buttons button {
            background: none;
            border: none;
            color: var(--primary-glow);
            cursor: pointer;
            font-size: 1.5em; /* Icon size */
            padding: 5px;
            transition: color 0.2s ease, transform 0.2s ease, filter 0.2s ease;
            outline: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            filter: drop-shadow(0 0 3px rgba(0, 255, 255, 0.3)); /* Consistent glow */
        }

        body.light-theme .input-buttons button {
            filter: drop-shadow(0 0 1px rgba(0, 123, 255, 0.2));
        }

        .input-buttons button:hover:not(:disabled) {
            color: var(--text-light);
            transform: translateY(-2px) scale(1.15); /* Lift and scale on hover */
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8)); /* Stronger hover glow */
        }

        body.light-theme .input-buttons button:hover:not(:disabled) {
            filter: drop-shadow(0 0 5px rgba(0, 123, 255, 0.5));
            color: var(--primary-glow-darker); /* Darker glow for light theme hover */
        }

        .input-buttons button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .input-buttons button:disabled {
            color: #555;
            cursor: not-allowed;
            filter: none;
            transform: none;
        }

        /* Specific styles for send button */
        #sendButton {
            font-size: 2em; /* Larger for send */
            padding: 0 10px;
            display: flex; /* For aligning loading dots */
            align-items: center;
            justify-content: center;
        }

        /* Clear button */
        #clearInputButton {
            display: none; /* Hidden by default */
            font-size: 1.3em;
            margin-right: -5px; /* Pull it slightly left */
        }
        #clearInputButton.visible {
            display: block;
        }

        /* Voice search button */
        #voiceSearchButton {
            font-size: 1.3em;
        }
        #voiceSearchButton.listening {
            color: #ff6666; /* Red when listening */
            animation: pulse-red 1s infinite alternate;
        }
        @keyframes pulse-red {
            0% { filter: drop-shadow(0 0 0px rgba(255, 102, 102, 0.5)); }
            100% { filter: drop-shadow(0 0 8px rgba(255, 102, 102, 0.8)); }
        }


        /* Suggestions Dropdown */
        #suggestions {
            position: absolute;
            top: 100%; /* Below the input */
            left: 0;
            right: 0;
            background-color: var(--suggestion-bg);
            border: 1px solid var(--response-border);
            border-top: none;
            border-radius: 0 0 15px 15px;
            max-height: 200px;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); /* Stronger shadow */
            display: none; /* Hidden by default */
            transition: background-color 0.5s ease, border-color 0.5s ease, opacity 0.3s ease, transform 0.3s ease;
            z-index: 9; /* Below search bar, above content */
            opacity: 0;
            transform: translateY(-5px); /* Initial state for animation */
            pointer-events: none; /* Prevent interaction when hidden */
        }
        #suggestions.visible {
            opacity: 1;
            transform: translateY(0); /* Final state for animation */
            pointer-events: auto; /* Allow interaction when visible */
        }
        #suggestions li {
            padding: 12px 25px;
            cursor: pointer;
            font-size: 0.95em;
            color: var(--text-light);
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        #suggestions li:hover, #suggestions li.active {
            background-color: var(--suggestion-hover-bg);
            color: var(--primary-glow);
        }
        #suggestions li:last-child {
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        /* Response Area */
        #responseArea {
            width: 90%;
            max-width: 600px;
            background-color: var(--response-bg);
            border: 1px solid var(--response-border);
            border-radius: 12px;
            padding: 30px; /* Increased padding */
            max-height: 55vh;
            overflow-y: auto;
            word-wrap: break-word;
            text-align: left;
            font-size: 1em;
            line-height: 1.7; /* Slightly increased line height for readability */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6), inset 0 0 8px rgba(255, 255, 255, 0.08); /* Stronger shadow */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease; /* Include theme transitions */
            z-index: 5;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            min-height: 100px; /* Ensure some minimum height */
        }

        #responseArea.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Styles for content inside responseArea */
        #responseArea p, #responseArea ul, #responseArea ol, #responseArea h1, #responseArea h2, #responseArea h3, #responseArea div.code-block, #responseArea blockquote {
            margin: 0 0 1em 0;
            padding: 0;
            /* Animation for content items */
            opacity: 0;
            transform: translateY(10px);
            transition: var(--item-fade-transition);
        }
        #responseArea p.fade-in, #responseArea ul.fade-in, #responseArea ol.fade-in, #responseArea h1.fade-in, #responseArea h2.fade-in, #responseArea h3.fade-in, #responseArea div.code-block.fade-in, #responseArea blockquote.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* Inline icon styling - for 'play_arrow' in intro text */
        p .inline-icon {
            font-size: 1.05em; /* Slightly larger than 1em to match text cap height better */
            vertical-align: -0.1em; /* Adjust alignment to visual center of text */
            color: var(--primary-glow);
            transition: color 0.5s ease;
        }

        #responseArea p:last-child, #responseArea li:last-child {
             margin-bottom: 0;
        }
        #responseArea ul li, #responseArea ol li { /* Improved list item spacing */
            margin-bottom: 0.8em; /* More space */
            padding-left: 0.2em;
        }
        #responseArea ul, #responseArea ol {
            margin-bottom: 1.5em; /* Ensure space after lists */
        }


        #responseArea h1, #responseArea h2, #responseArea h3 {
            color: var(--primary-glow);
            font-weight: 600;
            margin-top: 1.8em; /* More space above headings */
            margin-bottom: 0.8em; /* More space below headings */
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 0.5em;
            transition: color 0.5s ease, border-color 0.5s ease, text-shadow 0.5s ease;
            text-shadow: 0 0 6px rgba(0, 255, 255, 0.3); /* Subtler glow for headings */
        }
        body.light-theme #responseArea h1, body.light-theme #responseArea h2, body.light-theme #responseArea h3 {
            border-bottom: 1px solid rgba(0, 123, 255, 0.2);
            text-shadow: none; /* No text shadow in light theme */
        }

        #responseArea h1 { font-size: 2em; } /* Slightly larger headings */
        #responseArea h2 { font-size: 1.7em; }
        #responseArea h3 { font-size: 1.5em; }

        #responseArea strong {
            color: var(--primary-glow);
            font-weight: 600;
            transition: color 0.5s ease;
        }

        #responseArea em {
            color: #a0a0ff; /* This color might remain static or be adjusted for light theme */
            font-style: italic;
        }
        body.light-theme #responseArea em {
            color: #6a6aff; /* Lighter purple for emphasis in light theme */
        }

        #responseArea ul, #responseArea ol {
            padding-left: 25px; /* Slightly more padding for lists */
            margin-left: 5px;
        }
        #responseArea li {
            margin-bottom: 0.5em;
        }
        #responseArea a {
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        #responseArea a:hover {
            color: var(--primary-glow-darker);
            text-decoration: underline;
        }

        #responseArea blockquote {
            margin: 1.5em 0; /* More vertical spacing */
            padding: 15px 20px;
            border-left: 5px solid var(--primary-glow-darker); /* Thicker border */
            background-color: rgba(0, 255, 255, 0.08); /* Slightly more prominent glow background */
            border-radius: 8px; /* Softer corners */
            color: var(--text-light);
            font-style: italic; /* Blockquotes often benefit from italics */
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }
        body.light-theme #responseArea blockquote {
            background-color: rgba(0, 123, 255, 0.08);
            border-left-color: var(--primary-glow-darker);
        }


        /* Code block container */
        .code-block {
            position: relative;
            margin: 2em 0; /* More vertical margin for separation */
        }
        #responseArea pre {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-left: 5px solid var(--primary-glow-darker);
            padding: 15px 20px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            line-height: 1.5;
            letter-spacing: 0.01em; /* Subtle letter spacing for code readability */
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.6); /* Deeper inset shadow */
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }
        #responseArea code {
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 5px;
            border-radius: 4px;
            transition: background-color 0.5s ease;
        }
        body.light-theme #responseArea code {
            background-color: rgba(0, 0, 0, 0.05);
        }
        #responseArea pre code {
            background-color: transparent;
            padding: 0;
        }

        /* Copy Code Button */
        .copy-code-button {
            position: absolute;
            top: 10px; /* Adjusted position */
            right: 10px; /* Adjusted position */
            background-color: rgba(0, 0, 0, 0.6); /* Slightly darker background */
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.2); /* Subtle border */
            border-radius: 6px; /* Slightly more rounded */
            padding: 6px 12px; /* Increased padding */
            font-size: 0.85em; /* Slightly larger font */
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s ease, background-color 0.2s ease, transform 0.1s ease, color 0.2s ease, border-color 0.2s ease;
            z-index: 10;
        }
        body.light-theme .copy-code-button {
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--text-medium);
            border: 1px solid var(--response-border);
        }
        .copy-code-button:hover {
            opacity: 1;
            background-color: var(--primary-glow);
            color: var(--bg-dark);
            border-color: var(--primary-glow-darker);
            transform: translateY(-2px) scale(1.03); /* Lift and scale more on hover */
        }
        body.light-theme .copy-code-button:hover {
            background-color: var(--primary-glow);
            color: white;
        }
        .copy-code-button.copied {
            background-color: #28a745; /* Green on copied */
            color: white;
            border-color: #218838;
        }


        /* Scrollbar Styling for Webkit Browsers (Chrome, Edge, Safari) */
        #responseArea::-webkit-scrollbar {
            width: 8px;
        }
        #responseArea::-webkit-scrollbar-track {
            background: #282828;
            border-radius: 10px;
        }
        body.light-theme #responseArea::-webkit-scrollbar-track {
            background: #e0e0e5;
        }
        #responseArea::-webkit-scrollbar-thumb {
            background-color: var(--primary-glow);
            border-radius: 10px;
            border: 2px solid #282828;
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
            transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }
        body.light-theme #responseArea::-webkit-scrollbar-thumb {
            border: 2px solid #e0e0e5;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }
        #responseArea::-webkit-scrollbar-thumb:hover {
            background-color: var(--primary-glow-darker);
            border-color: var(--primary-glow-darker); /* Match thumb color */
        }

        /* Scrollbar Styling for Firefox */
        #responseArea {
            scrollbar-width: thin;
            scrollbar-color: var(--primary-glow) #282828;
        }
        body.light-theme #responseArea {
            scrollbar-color: var(--primary-glow) #e0e0e5;
        }


        /* Basic loading indicator style */
        .loading-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--primary-glow);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
            box-shadow: 0 0 5px var(--primary-glow);
            transition: background-color 0.5s ease, box-shadow 0.5s ease;
        }
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        .loading-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }

        /* AI Typing Animation */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em; /* Adjust to match line height */
            background-color: var(--typing-cursor);
            vertical-align: middle;
            animation: blink-cursor 0.7s infinite;
            margin-left: 2px;
        }
        @keyframes blink-cursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Error message style */
        .error-message {
            color: var(--error-color);
            font-weight: 500;
        }

        /* --- API Key Management Link - HIDDEN/REMOVED --- */
        #apiKeyLink {
            display: none; /* Hide the API Key link */
        }

        /* --- Theme Toggle Button --- */
        #themeToggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 2.3em; /* Slightly larger */
            cursor: pointer;
            color: var(--button-icon-color);
            transition: color 0.3s ease, transform 0.3s ease;
            outline: none;
            z-index: 100;
            padding: 5px; /* Make click area slightly larger */
        }
        #themeToggle:hover {
            color: var(--primary-glow);
            transform: rotate(30deg) scale(1.18); /* More pronounced rotation and scale */
        }
        #themeToggle:active {
            transform: scale(0.95);
        }

        /* Media Queries for better responsiveness */
        @media (max-width: 480px) {
            body {
                padding: 3vh 0; /* Less padding on small screens */
            }
            .app-title {
                margin-bottom: 25px;
                font-size: clamp(1.8em, 7vw, 2.5em); /* Adjust for smaller screens */
            }
            #searchInput {
                padding: 12px 16px;
                padding-right: 100px;
                font-size: 0.95em;
            }
            .input-buttons {
                right: 8px;
                gap: 2px;
            }
            .input-buttons button {
                font-size: 1.2em;
                padding: 3px;
            }
            #sendButton {
                font-size: 1.6em;
            }
            #clearInputButton {
                font-size: 1em;
            }
            #voiceSearchButton {
                font-size: 1em;
            }
            #responseArea {
                padding: 20px;
                font-size: 0.9em;
                min-height: 80px;
            }
            #responseArea h1 { font-size: 1.6em; }
            #responseArea h2 { font-size: 1.4em; }
            #responseArea h3 { font-size: 1.2em; }
            #responseArea ul, #responseArea ol {
                padding-left: 20px;
            }
            #themeToggle {
                font-size: 1.8em;
                top: 15px;
                right: 15px;
            }
        }

    </style>
</head>
<body>

    <!-- Google Generative AI JavaScript SDK - REMOVED, now handled by backend -->

    <button id="themeToggle" aria-label="Toggle theme">
        <!-- Material Symbols Icons for theme toggle -->
        <span class="material-symbols-outlined icon-dark">dark_mode</span>
        <span class="material-symbols-outlined icon-light" style="display: none;">light_mode</span>
    </button>

    <h1 class="app-title">Gemini Glow Search Pro</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Ask Gemini something..." aria-label="Search or ask Gemini" autofocus autocomplete="off" aria-autocomplete="list" aria-controls="suggestions" aria-expanded="false">
        <div class="input-buttons">
            <button id="clearInputButton" class="material-symbols-outlined" aria-label="Clear input">close</button>
            <button id="voiceSearchButton" class="material-symbols-outlined" aria-label="Voice search">mic</button>
            <button id="sendButton" aria-label="Send message">play_arrow</button>
        </div>
        <ul id="suggestions" role="listbox" aria-label="Search suggestions"></ul>
    </div>

    <div id="responseArea" role="region" aria-live="polite" aria-atomic="false">
        <!-- Initial content will be dynamically typed out by JS -->
    </div>

    <!-- API Key Management Link - REMOVED -->

    <!-- API Key Modal - REMOVED -->

    <script>
        // --- DOM Elements ---
        const searchInput = document.getElementById('searchInput');
        const sendButton = document.getElementById('sendButton');
        const clearInputButton = document.getElementById('clearInputButton');
        const voiceSearchButton = document.getElementById('voiceSearchButton');
        const responseArea = document.getElementById('responseArea');
        const themeToggle = document.getElementById('themeToggle');
        const iconDark = themeToggle.querySelector('.icon-dark');
        const iconLight = themeToggle.querySelector('.icon-light');
        const suggestionsList = document.getElementById('suggestions');
        const searchContainer = document.querySelector('.search-container');

        // --- Constants ---
        const BACKEND_URL = 'http://localhost:3000'; // Your backend server URL
        const THEME_STORAGE_KEY = 'userTheme';
        const TYPING_SPEED = 20; // Milliseconds per character
        const DEBOUNCE_DELAY = 300; // Milliseconds for autosuggest debounce

        // --- Global State ---
        let currentSuggestions = [];
        let suggestionIndex = -1;
        let isGenerating = false; // Flag to prevent multiple requests
        let speechRecognition; // Web Speech API
        let chatHistory = []; // Stores conversation history for context

        // --- Theme Toggle Logic ---
        function applyTheme(theme) {
            document.body.classList.toggle('light-theme', theme === 'light');
            iconDark.style.display = theme === 'dark' ? 'inline-flex' : 'none';
            iconLight.style.display = theme === 'light' ? 'inline-flex' : 'none';
            localStorage.setItem(THEME_STORAGE_KEY, theme);
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem(THEME_STORAGE_KEY) || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
        }

        // --- Markdown to HTML Conversion ---
        function formatMarkdown(markdownText) {
            let html = markdownText || '';

            // Ensure consistent newlines for processing
            html = html.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            // --- Block-level elements (process first to avoid issues with inline elements) ---

            // Handle code blocks (must be first, and handle multiline code safely)
            html = html.replace(/```(\w*)\n([\s\S]*?)```/gm, (match, lang, code) => {
                const languageClass = lang ? `language-${lang.toLowerCase()}` : '';
                return `<div class="code-block"><button class="copy-code-button" aria-label="Copy code to clipboard">Copy</button><pre><code class="${languageClass}">${escapeHtml(code.trim())}</code></pre></div>`;
            });

            // Blockquotes
            html = html.replace(/^> (.*$)/gim, (match, content) => `<blockquote><p>${content}</p></blockquote>`);

            // Headings
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Lists - Process line by line to correctly handle nested lists (simple nesting) and paragraphs between lists
            const lines = html.split('\n');
            let processedLines = [];
            let listStack = []; // To handle nested lists more robustly

            lines.forEach(line => {
                const ulMatch = line.match(/^(\s*)[*-] (.*)/);
                const olMatch = line.match(/^(\s*)(\d+)\. (.*)/);

                if (ulMatch || olMatch) {
                    const currentIndent = ulMatch ? ulMatch[1].length : olMatch[1].length;
                    const currentListType = ulMatch ? 'ul' : 'ol';
                    const listItemContent = ulMatch ? ulMatch[2].trim() : olMatch[3].trim();

                    // Close lists that are at a higher indent level
                    while (listStack.length > 0 && currentIndent <= listStack[listStack.length - 1].indent) {
                        processedLines.push(`</${listStack.pop().type}>`);
                    }

                    // Open new list if type or indent changes
                    if (listStack.length === 0 || currentListType !== listStack[listStack.length - 1].type || currentIndent > listStack[listStack.length - 1].indent) {
                        processedLines.push(`<${currentListType}>`);
                        listStack.push({ type: currentListType, indent: currentIndent });
                    }

                    processedLines.push(`<li>${listItemContent}</li>`);
                } else {
                    // Close all open lists if a non-list item is encountered
                    while (listStack.length > 0) {
                        processedLines.push(`</${listStack.pop().type}>`);
                    }
                    // Handle paragraphs, but not empty lines or lines already processed as blocks
                    if (line.trim() !== '' &&
                        !line.startsWith('<h') && !line.startsWith('<blockquote>') && !line.startsWith('<div class="code-block">')) {
                        processedLines.push(`<p>${line.trim()}</p>`);
                    } else if (line.trim() !== '') {
                        processedLines.push(line); // Preserve already processed block elements
                    }
                }
            });
            // Close any remaining open lists at the end
            while (listStack.length > 0) {
                processedLines.push(`</${listStack.pop().type}>`);
            }
            html = processedLines.join('\n');

            // --- Inline elements ---

            // Inline code (must be before strong/em to prevent `**code**` from becoming bold code)
            html = html.replace(/`([^`]+)`/g, (match, code) => `<code>${escapeHtml(code)}</code>`);

            // Bold and Italic (order matters: bold then italic)
            html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/gim, '<em>$1</em>');

            // Links (basic Markdown links)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');


            // Remove empty paragraph tags (can result from markdown processing)
            html = html.replace(/<p>\s*<\/p>/g, '');

            // Convert remaining isolated newlines not inside block elements to <br> for spacing
            // This is a rough heuristic; a full markdown parser would handle this better.
            html = html.replace(/([^\n])\n(?![<])/g, '$1<br>');

            return html;
        }

        // Helper to prevent XSS (Cross-Site Scripting) in dynamically inserted content
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }


        // --- Response Display & Typing Animation ---
        async function displayResponse(fullHtmlContent, animate = true) {
            responseArea.classList.add('visible');

            if (!animate) {
                responseArea.innerHTML = fullHtmlContent;
                addCopyCodeButtons();
                // Add fade-in class for all direct content-bearing children for static content
                Array.from(responseArea.querySelectorAll('p, ul, ol, h1, h2, h3, blockquote, .code-block')).forEach(child => child.classList.add('fade-in'));
                scrollToBottom();
                return;
            }

            responseArea.innerHTML = ''; // Clear previous content for typing effect
            let currentContent = '';
            // Split by words, but also keep HTML tags intact for proper rendering
            const words = fullHtmlContent.split(/(\s+|(?=<[^>]*>))/g);

            for (const word of words) {
                currentContent += word;
                responseArea.innerHTML = currentContent + '<span class="typing-cursor"></span>';
                scrollToBottom(); // Keep scrolling as content appears
                await new Promise(resolve => setTimeout(resolve, TYPING_SPEED));
            }

            // Remove typing cursor after full content is displayed
            responseArea.innerHTML = fullHtmlContent;
            addCopyCodeButtons(); // Add copy buttons after the text is fully rendered

            // Add fade-in class to individual elements *after* typing is complete
            // This allows them to animate into place if they are block elements
            Array.from(responseArea.querySelectorAll('p, ul, ol, h1, h2, h3, blockquote, .code-block')).forEach((child, index) => {
                setTimeout(() => {
                    child.classList.add('fade-in');
                }, index * 50); // Stagger fade-in for block elements
            });

            scrollToBottom();
        }

        function scrollToBottom() {
            responseArea.scrollTop = responseArea.scrollHeight;
        }

        function setLoadingState(isLoading) {
            isGenerating = isLoading;
            sendButton.disabled = isLoading;
            searchInput.disabled = isLoading;
            voiceSearchButton.disabled = isLoading;
            clearInputButton.disabled = isLoading;

            if (isLoading) {
                sendButton.innerHTML = `<span class="loading-dot" role="status" aria-label="Loading"></span><span class="loading-dot" role="status" aria-label="Loading"></span><span class="loading-dot" role="status" aria-label="Loading"></span>`;
                searchInput.placeholder = "Gemini is thinking...";
                searchInput.setAttribute('aria-busy', 'true');
                responseArea.setAttribute('aria-live', 'polite'); // Ensure loading is announced
            } else {
                sendButton.innerHTML = `play_arrow`; // Material Symbols icon
                searchInput.placeholder = "Ask Gemini something...";
                searchInput.focus(); // Return focus to input
                searchInput.removeAttribute('aria-busy');
                responseArea.setAttribute('aria-live', 'polite'); // Revert to polite for general updates
            }
        }

        // --- Copy Code Functionality ---
        function addCopyCodeButtons() {
            document.querySelectorAll('.code-block').forEach(codeBlock => {
                const button = codeBlock.querySelector('.copy-code-button');
                const pre = codeBlock.querySelector('pre');
                if (button && pre) {
                    // Remove existing event listener to prevent duplicates
                    const newButton = button.cloneNode(true);
                    button.parentNode.replaceChild(newButton, button);

                    newButton.addEventListener('click', () => {
                        const code = pre.textContent;
                        navigator.clipboard.writeText(code).then(() => {
                            newButton.textContent = 'Copied!';
                            newButton.classList.add('copied');
                            setTimeout(() => {
                                newButton.textContent = 'Copy';
                                newButton.classList.remove('copied');
                            }, 2000);
                        }).catch(err => {
                            console.error('Failed to copy code: ', err);
                            alert('Failed to copy code.');
                        });
                    });
                }
            });
        }

        // --- Send Message to Gemini (via backend) ---
        async function sendMessage() {
            const promptText = searchInput.value.trim();
            if (!promptText || isGenerating) return;

            searchInput.value = ''; // Clear input
            clearInputButton.classList.remove('visible'); // Hide clear button
            hideSuggestions();
            setLoadingState(true);

            // Add user's message to chat history for context
            chatHistory.push({ role: "user", parts: [{ text: promptText }] });

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: promptText, history: chatHistory }), // Send prompt and full history
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();
                const aiResponseText = data.response;

                // Add Gemini's response to chat history
                chatHistory.push({ role: "model", parts: [{ text: aiResponseText }] });

                await displayResponse(formatMarkdown(aiResponseText));
            } catch (error) {
                console.error("Error communicating with backend/Gemini AI:", error);
                displayResponse(`<p class="error-message">Error: ${error.message}. Please ensure your backend server is running and configured correctly.</p>`, false); // Don't animate errors
                // If there was an error, the last user message should ideally not be added to history,
                // or marked as failed, but for simplicity here, we'll just log and display error.
                // You might want to remove the last chatHistory entry if it was a user message that failed.
                chatHistory.pop(); // Remove the user message that caused the error for a cleaner history
            } finally {
                setLoadingState(false);
            }
        }

        // --- Autosuggest / Autocomplete Logic ---
        const predefinedSuggestions = [
            "Explain quantum computing in simple terms",
            "Give me ideas for a 3-course meal",
            "Write a short story about a brave knight",
            "What's the capital of France?",
            "How does photosynthesis work?",
            "Suggest some healthy breakfast options",
            "Tell me a fun fact about space",
            "What are the benefits of exercise?",
            "Summarize the plot of Hamlet",
            "Write a Python function to sort a list",
            "Describe the history of artificial intelligence",
            "What are the best places to visit in Japan?",
            "Explain the concept of blockchain technology.",
            "Give me a recipe for homemade pizza.",
            "Generate a list of unique baby names.",
            "How do I start learning to code?",
            "What is the difference between AI, ML, and Deep Learning?",
            "Recommend some science fiction books.",
            "Translate 'Hello, how are you?' into Spanish.",
            "Write a short, inspiring quote.",
            "What is the current time in New York?", // Good for testing the tool!
            "What is the date and time right now?", // Good for testing the tool!
            "What time is it in London?" // Good for testing the tool!
        ];

        function showSuggestions() {
            const query = searchInput.value.toLowerCase();
            suggestionsList.innerHTML = '';
            suggestionIndex = -1; // Reset selection

            if (query.length < 2) { // Only show suggestions for longer queries
                hideSuggestions();
                return;
            }

            currentSuggestions = predefinedSuggestions.filter(s =>
                s.toLowerCase().includes(query)
            ).slice(0, 5); // Limit to 5 suggestions

            if (currentSuggestions.length > 0) {
                currentSuggestions.forEach((s, index) => {
                    const li = document.createElement('li');
                    li.textContent = s;
                    li.setAttribute('role', 'option');
                    li.setAttribute('id', `suggestion-${index}`);
                    li.setAttribute('tabindex', '-1'); // Make them focusable but not in tab order
                    li.addEventListener('click', () => {
                        searchInput.value = s;
                        sendMessage();
                        hideSuggestions();
                    });
                    suggestionsList.appendChild(li);
                });
                suggestionsList.classList.add('visible');
                searchInput.classList.add('suggestions-visible'); // Add class to input for border-radius change
                searchInput.setAttribute('aria-expanded', 'true');
            } else {
                hideSuggestions();
            }
        }

        function hideSuggestions() {
            suggestionsList.classList.remove('visible');
            searchInput.classList.remove('suggestions-visible'); // Remove class from input
            suggestionsList.innerHTML = '';
            searchInput.setAttribute('aria-expanded', 'false');
            searchInput.removeAttribute('aria-activedescendant'); // Clear active descendant
        }

        let debounceTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => {
                showSuggestions();
            }, DEBOUNCE_DELAY);

            if (searchInput.value.length > 0) {
                clearInputButton.classList.add('visible');
            } else {
                clearInputButton.classList.remove('visible');
                hideSuggestions();
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            if (!suggestionsList.classList.contains('visible') || currentSuggestions.length === 0) return;

            const items = suggestionsList.children;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (suggestionIndex < currentSuggestions.length - 1) {
                    suggestionIndex++;
                } else {
                    suggestionIndex = 0; // Wrap around
                }
                updateSuggestionSelection(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (suggestionIndex > 0) {
                    suggestionIndex--;
                } else {
                    suggestionIndex = currentSuggestions.length - 1; // Wrap around
                }
                updateSuggestionSelection(items);
            } else if (e.key === 'Enter' && suggestionIndex !== -1) {
                e.preventDefault();
                searchInput.value = currentSuggestions[suggestionIndex];
                sendMessage();
                hideSuggestions();
            } else if (e.key === 'Escape') {
                hideSuggestions();
            }
        });

        function updateSuggestionSelection(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
                items[i].setAttribute('aria-selected', 'false');
            }
            if (suggestionIndex !== -1) {
                items[suggestionIndex].classList.add('active');
                items[suggestionIndex].setAttribute('aria-selected', 'true');
                searchInput.setAttribute('aria-activedescendant', `suggestion-${suggestionIndex}`);
                // Scroll to make the selected item visible
                const itemRect = items[suggestionIndex].getBoundingClientRect();
                const listRect = suggestionsList.getBoundingClientRect();
                if (itemRect.bottom > listRect.bottom) {
                    suggestionsList.scrollTop += itemRect.bottom - listRect.bottom;
                } else if (itemRect.top < listRect.top) {
                    suggestionsList.scrollTop -= listRect.top - itemRect.top;
                }
            } else {
                 searchInput.removeAttribute('aria-activedescendant');
            }
            // Decided against auto-filling input with suggestion on arrow key to avoid disrupting user's original query.
            // User can press Enter to select.
        }

        // Close suggestions if clicked outside
        document.addEventListener('click', (e) => {
            if (!searchContainer.contains(e.target) && suggestionsList.classList.contains('visible')) {
                hideSuggestions();
            }
        });


        // --- Voice Search Logic ---
        function initializeVoiceSearch() {
            if ('webkitSpeechRecognition' in window) {
                speechRecognition = new webkitSpeechRecognition();
                speechRecognition.continuous = false;
                speechRecognition.interimResults = false;
                speechRecognition.lang = 'en-US';

                speechRecognition.onstart = () => {
                    voiceSearchButton.classList.add('listening');
                    searchInput.placeholder = "Listening...";
                    searchInput.value = "";
                    searchInput.focus();
                    searchInput.setAttribute('aria-live', 'assertive');
                };

                speechRecognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    searchInput.value = transcript;
                    voiceSearchButton.classList.remove('listening');
                    searchInput.removeAttribute('aria-live');
                    sendMessage();
                };

                speechRecognition.onerror = (event) => {
                    console.error('Speech Recognition Error:', event.error);
                    voiceSearchButton.classList.remove('listening');
                    searchInput.placeholder = "Voice search failed.";
                    searchInput.removeAttribute('aria-live');
                    if (event.error === 'not-allowed') {
                        alert("Microphone access blocked. Please enable it in your browser settings.");
                    } else if (event.error === 'no-speech') {
                         searchInput.placeholder = "No speech detected. Try again?";
                    } else if (event.error === 'network') {
                        searchInput.placeholder = "Network error with voice recognition. Try again?";
                    }
                    setTimeout(() => {
                        if (!isGenerating) {
                            searchInput.placeholder = "Ask Gemini something...";
                        }
                    }, 3000);
                };

                speechRecognition.onend = () => {
                    voiceSearchButton.classList.remove('listening');
                    searchInput.removeAttribute('aria-live');
                    if (!isGenerating && searchInput.value === "") {
                        searchInput.placeholder = "Ask Gemini something...";
                    }
                };

                voiceSearchButton.addEventListener('click', () => {
                    if (isGenerating) return;
                    if (voiceSearchButton.classList.contains('listening')) {
                        speechRecognition.stop();
                    } else {
                        speechRecognition.start();
                    }
                });
            } else {
                voiceSearchButton.style.display = 'none';
                console.warn("Web Speech API (webkitSpeechRecognition) not supported in this browser.");
            }
        }


        // --- Event Listeners ---
        sendButton.addEventListener('click', sendMessage);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (suggestionsList.classList.contains('visible') && suggestionIndex !== -1) {
                    // Handled by keydown already, but good to ensure
                } else {
                    sendMessage();
                }
            }
        });
        clearInputButton.addEventListener('click', () => {
            searchInput.value = '';
            clearInputButton.classList.remove('visible');
            searchInput.focus();
            hideSuggestions();
        });
        themeToggle.addEventListener('click', toggleTheme);


        // --- Initialize on page load ---
        document.addEventListener('DOMContentLoaded', () => {
            // Apply saved theme or default to dark
            const savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || 'dark';
            applyTheme(savedTheme);

            // Initialize Voice Search
            initializeVoiceSearch();

            const initialWelcomeMarkdown = `
Hello there! I'm Gemini, ready to assist you using the **Flash 1.5 model**.

I'm powered by a robust backend that keeps our conversation context and allows me to perform **complex tasks** like:
*   Answering general questions.
*   Generating creative content.
*   **Using tools** (like getting the current date and time for any location!)

**Here's how you can interact with me:**
*   Type your questions in the search bar above.
*   Use the <span class="material-symbols-outlined inline-icon">mic</span> button for voice input.
*   Press Enter or the <span class="material-symbols-outlined inline-icon">play_arrow</span> button to send your query.

Feel free to ask me anything — I remember our conversation context!
            `;

            // Display the welcome message as if Gemini typed it
            displayResponse(formatMarkdown(initialWelcomeMarkdown), true);

            // Update clear button visibility on load if input already has text (e.g., browser autofill)
            if (searchInput.value.length > 0) {
                clearInputButton.classList.add('visible');
            }

            // Initially enable send button as backend presence is assumed at runtime
            sendButton.disabled = false;
            searchInput.disabled = false;
            searchInput.placeholder = "Ask Gemini something...";
            searchInput.focus();
        });
    </script>
</body>
</html>
